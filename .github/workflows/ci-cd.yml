name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-deploy:
    name: Build, Test, Artifact & Deploy
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '18'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Run application (show startup output)
        run: |
          set -o pipefail
          npm run start --if-present 2>&1 | sed -u 's/^/[app] /' &
          APP_PID=$!
          # allow app to start and produce logs, then kill to avoid hanging the job
          sleep 8
          kill $APP_PID || true
        shell: bash

      - name: Archive production artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: |
            dist
            build
            ./**/package.json

      - name: Deploy to server (SSH)
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: "dist/"
          target: ${{ secrets.DEPLOY_PATH }}
          rm: true
